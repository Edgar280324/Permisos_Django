{% extends 'base.html' %}

{% block content %}
<h2 class="mb-3">Crear articulo</h2>

<form method="post" class="card card-body">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Guardar</button>
  <a href="{% url 'article_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
