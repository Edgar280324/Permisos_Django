{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 480px;">
  <h2 class="mb-4">Establecer nueva contraseña</h2>
  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="w-100 btn btn-lg btn-primary mt-2">Cambiar contraseña</button>
    </form>
  {% else %}
    <div class="alert alert-danger" role="alert">
      <p>El enlace de recuperación no es válido o ha expirado.</p>
      <p>Por favor solicita uno nuevo.</p>
    </div>
    <a href="{% url 'password_reset' %}" class="btn btn-secondary">Solicitar nuevo enlace</a>
  {% endif %}
</div>
{% endblock %}
