{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width: 480px;">
  <h2 class="mb-4">Recuperar contraseña</h2>
  <p class="text-muted">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="w-100 btn btn-lg btn-primary mt-2">Enviar enlace</button>
  </form>
  <p class="mt-3"><a href="{% url 'login' %}">← Volver al inicio de sesión</a></p>
</div>
{% endblock %}
