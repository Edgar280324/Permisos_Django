<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="text-center d-flex flex-column align-items-center justify-content-center" style="min-height:100vh;">
  <main class="form-signin" style="width:100%;max-width:400px;">
    <form method="post">
      {% csrf_token %}
      <h1 class="h3 mb-3 fw-normal">Crear cuenta</h1>
      {{ form.as_p }}
      <button class="w-100 btn btn-lg btn-primary mt-2" type="submit">Registrarse</button>
    </form>
    <p class="mt-3">
      ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
    </p>
  </main>
</body>
</html>
